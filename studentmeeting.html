  <style>

/* ===== STUDENT MEETING GRID REDESIGN ===== */

/* --- Grid layout --- */
#studentMeetingRoot .roster {
  grid-template-columns: 90px 90px 110px minmax(260px, 1.1fr) minmax(280px, 1.3fr) minmax(260px, 1.1fr);
  row-gap: 0;
  column-gap: 0;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #e2e8f0;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
}

/* --- Header row --- */
#studentMeetingRoot .roster__head {
  background: #f8fafc;
  border-bottom: 2px solid #e2e8f0;
  padding: 12px 8px;
  text-align: center;
}

#studentMeetingRoot .head {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0;
  border-radius: 0;
  font-size: 12px;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  border: none;
  background: transparent;
  box-shadow: none;
  white-space: nowrap;
}

#studentMeetingRoot .head i { font-size: 12px; opacity: 0.7; }

/* Header colors — subtle text color only */
#studentMeetingRoot .head--day   { color: #475569; }
#studentMeetingRoot .head--time  { color: #475569; }
#studentMeetingRoot .head--note  { color: #475569; }
#studentMeetingRoot .head--main  { color: #4338ca; }
#studentMeetingRoot .head--other { color: #c2410c; }
#studentMeetingRoot .head--assign { color: #be123c; }


/* --- Day label: sidebar accent style --- */
#studentMeetingRoot .roster__day {
  background: #fff;
  border-radius: 0;
  box-shadow: none;
  padding: 32px 8px;
  font-weight: 800;
  font-size: 13px;
  color: #1e293b;
  border-right: 1px solid #f1f5f9;
  border-bottom: 1px solid #f1f5f9;
  position: relative;
  display: flex;              /* NEW: explicit flex */
  flex-direction: column;     /* NEW: stack day name + HÔM NAY vertically */
  align-items: center;
  justify-content: center;
  text-align: center;
  white-space: nowrap;        /* NEW: keep "Thứ tư" on one line */
  gap: 4px;                   /* NEW: small space between name and HÔM NAY */
}

/* Colored left accent bar per day */
#studentMeetingRoot .roster__day::before {
  content: '';
  position: absolute;
  left: 0;
  top: 8px;
  bottom: 8px;
  width: 4px;
  border-radius: 0 4px 4px 0;
}
#studentMeetingRoot .roster__day.day-1::before { background: #3b82f6; }
#studentMeetingRoot .roster__day.day-2::before { background: #10b981; }
#studentMeetingRoot .roster__day.day-3::before { background: #f59e0b; }
#studentMeetingRoot .roster__day.day-4::before { background: #f97316; }
#studentMeetingRoot .roster__day.day-5::before { background: #8b5cf6; }
#studentMeetingRoot .roster__day.day-6::before { background: #14b8a6; }
#studentMeetingRoot .roster__day.day-7::before { background: #f43f5e; }

/* Remove pastel backgrounds from day labels */
#studentMeetingRoot .roster__day.day-1,
#studentMeetingRoot .roster__day.day-2,
#studentMeetingRoot .roster__day.day-3,
#studentMeetingRoot .roster__day.day-4,
#studentMeetingRoot .roster__day.day-5,
#studentMeetingRoot .roster__day.day-6,
#studentMeetingRoot .roster__day.day-7 {
  background: #fff;
  border-color: #f1f5f9;
}


/* --- Cells: clean white --- */
#studentMeetingRoot .roster__cell {
  background: #fff;
  border-radius: 0;
  box-shadow: none;
  padding: 22px 10px;        /* was 12px → more vertical breathing room */
  border-right: 1px solid #f1f5f9;
  border-bottom: 1px solid #f1f5f9;
  min-height: 72px;          /* was 52px → taller minimum row */
}

/* Remove pastel backgrounds from cells */
#studentMeetingRoot .roster__cell.day-1,
#studentMeetingRoot .roster__cell.day-2,
#studentMeetingRoot .roster__cell.day-3,
#studentMeetingRoot .roster__cell.day-4,
#studentMeetingRoot .roster__cell.day-5,
#studentMeetingRoot .roster__cell.day-6,
#studentMeetingRoot .roster__cell.day-7 {
  background: #fff;
  border-color: #f1f5f9;
}

/* Remove borders on last column */
#studentMeetingRoot .roster__cell:nth-child(6n) {
  border-right: none;
}


/* --- Row separator: subtle --- */
#studentMeetingRoot .roster__sep {
  grid-column: 1 / -1;
  height: 0;
  position: relative;
}
#studentMeetingRoot .roster__sep::after {
  display: none;
}


/* --- Today's row highlight --- */
#studentMeetingRoot .roster__day.day-today,
#studentMeetingRoot .roster__cell.day-today {
  background: #fefce8 !important;
}
#studentMeetingRoot .roster__day.day-today {
  font-weight: 900;
  color: #92400e;
}
#studentMeetingRoot .roster__day.day-today::after {
  content: 'HÔM NAY';
  display: block;
  font-size: 9px;
  font-weight: 800;
  color: #d97706;
  letter-spacing: 0.5px;
  margin-top: 0;                 /* gap on parent now handles spacing */
  padding: 2px 6px;
  background: #fef3c7;           /* soft amber pill background */
  border-radius: 6px;
  line-height: 1.2;
}


/* --- Centered columns --- */
#studentMeetingRoot .roster__cell.roster__cell--center {
  align-items: center;
  text-align: center;
}
#studentMeetingRoot .roster__cell.roster__cell--center .badge,
#studentMeetingRoot .roster__cell.roster__cell--center .time-pill {
  align-self: center;
}


/* --- Time pill refinement --- */
#studentMeetingRoot .time-pill {
  font-size: 15px;
  font-weight: 800;
  padding: 6px 14px;
  border-radius: 10px;
  background: #0f172a; /* fallback */
  color: #fff;
  border: none;
  box-shadow: 0 2px 6px rgba(15, 23, 42, 0.15);
}
#studentMeetingRoot .time-pill i {
  font-size: 12px;
  opacity: 0.85;
}

/* Per-day time pill colors (match the day accent bar) */
#studentMeetingRoot .roster__cell.day-1 .time-pill { background: #3b82f6; box-shadow: 0 2px 6px rgba(59, 130, 246, 0.3); }   /* Mon — blue */
#studentMeetingRoot .roster__cell.day-2 .time-pill { background: #10b981; box-shadow: 0 2px 6px rgba(16, 185, 129, 0.3); }   /* Tue — green */
#studentMeetingRoot .roster__cell.day-3 .time-pill { background: #f59e0b; box-shadow: 0 2px 6px rgba(245, 158, 11, 0.3); }   /* Wed — amber */
#studentMeetingRoot .roster__cell.day-4 .time-pill { background: #f97316; box-shadow: 0 2px 6px rgba(249, 115, 22, 0.3); }   /* Thu — orange */
#studentMeetingRoot .roster__cell.day-5 .time-pill { background: #8b5cf6; box-shadow: 0 2px 6px rgba(139, 92, 246, 0.3); }   /* Fri — purple */
#studentMeetingRoot .roster__cell.day-6 .time-pill { background: #14b8a6; box-shadow: 0 2px 6px rgba(20, 184, 166, 0.3); }   /* Sat — teal */
#studentMeetingRoot .roster__cell.day-7 .time-pill { background: #f43f5e; box-shadow: 0 2px 6px rgba(244, 63, 94, 0.3); }   /* Sun — rose */


/* --- "Chưa tới giờ" text: styled info badge --- */
#studentMeetingRoot .teacher-off-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 12.5px;
  font-weight: 600;
  color: #64748b;
  background: #f1f5f9;
  border: 1px solid #e2e8f0;
  line-height: 1.3;
}
#studentMeetingRoot .teacher-off-badge i {
  color: #94a3b8;
  font-size: 13px;
}


/* --- Badge refinements --- */
#studentMeetingRoot .badge--main,
#studentMeetingRoot .badge--aux {
  font-size: 11.5px;
  padding: 5px 12px;
  border-radius: 8px;
}


/* --- Responsive --- */
@media (max-width: 720px) {
  #studentMeetingRoot .roster {
    grid-template-columns: 72px 88px 110px minmax(240px, 1fr) minmax(260px, 1.1fr) minmax(240px, 1fr);
  }
}

/* === Wrap card content + breakout rooms so nothing gets clipped === */

/* Allow the table to scroll horizontally if total min-width exceeds the screen */
#studentMeetingRoot .roster {
  overflow-x: auto;
}

/* Teacher card header: let avatar/name and the "Meeting chính" button wrap onto a new line on narrow widths */
#studentMeetingRoot .tmc-header {
  flex-wrap: wrap;
  row-gap: 8px;
}

/* The "Meeting chính" button: don't shrink, let it drop down */
#studentMeetingRoot .tmc-main-btn {
  flex-shrink: 0;
}

/* Card body shouldn't overflow its cell */
#studentMeetingRoot .tmc-card {
  max-width: 100%;
  box-sizing: border-box;
}

/* Breakout rooms: wrap to multiple rows when there isn't enough space */
#studentMeetingRoot .tmc-rooms,
#studentMeetingRoot .tmc-rooms-list {
  flex-wrap: wrap;
  row-gap: 6px;
}

/* Each breakout room button: don't get squished */
#studentMeetingRoot .tmc-room-btn {
  flex-shrink: 0;
}

/* Long teacher names/emails: wrap nicely instead of overflowing */
#studentMeetingRoot .tmc-name,
#studentMeetingRoot .tmc-status {
  word-break: break-word;
  overflow-wrap: anywhere;
}


</style>

</head>
<body>
  <!-- ---------- Login Card (same layout as index.html) ---------- -->
  <div class="card" id="loginCard">
    <div class="logo">Meetings</div>
    <div class="subtitle">Đăng nhập bằng email &amp; mật khẩu của bạn</div>

    <div class="field">
      <input id="email" type="email" autocomplete="username" placeholder="Email" required />
    </div>

    <div class="field">
      <input id="password" type="password" autocomplete="current-password" placeholder="Mật khẩu" required />
      <button class="toggle-password" id="togglePwd" aria-label="Hiện/ẩn mật khẩu">👁️</button>
    </div>

    <button class="btn" id="login">Đăng nhập</button>
    <div id="message" aria-live="polite"></div> 
  </div>

  <!-- Page content (hidden until logged in) -->
  <div class="meeting-list" id="studentMeetingRoot" style="margin-top:18px; display:none;">
   <h2 class="section-title">Lịch học của bạn</h2>
<div id="scheduleGrid" aria-live="polite"></div>

  </div>

<!-- Gọi hỗ trợ button -->
<style>
  @keyframes supportRing {
    0%   { transform:scale(1); opacity:.6; }
    70%  { transform:scale(2.2); opacity:0; }
    100% { transform:scale(2.2); opacity:0; }
  }
  @keyframes supportBounce {
    0%,100% { transform:translateY(0); }
    50%     { transform:translateY(-4px); }
  }
  #supportCallBtn {
    position:fixed; bottom:24px; right:24px; z-index:9999;
    display:flex; align-items:center; gap:9px;
    background:linear-gradient(135deg,#4f8cff,#6c5ce7);
    color:#fff; padding:13px 22px; border-radius:50px;
    font-family:Inter,sans-serif; font-size:15px; font-weight:600;
    text-decoration:none;
    box-shadow:0 4px 18px rgba(108,92,231,.35);
    animation: supportBounce 2s ease-in-out infinite;
    transition: transform .2s, box-shadow .2s;
  }
  #supportCallBtn:hover {
    transform:translateY(-2px) scale(1.05);
    box-shadow:0 6px 25px rgba(108,92,231,.5);
  }
  #supportCallBtn .ring {
    position:absolute; top:0; left:0; right:0; bottom:0;
    border-radius:50px;
    border:2px solid rgba(79,140,255,.6);
    animation: supportRing 2s ease-out infinite;
    pointer-events:none;
  }
  #supportCallBtn i { font-size:18px; }
</style>
<a href="https://calling.tansinh.info/students" target="_blank" id="supportCallBtn">
  <span class="ring"></span>
  <i class="fas fa-phone-volume"></i>
  Gọi hỗ trợ
</a>

</body>
