  <style>
    .ot-container {
      width: min(1800px, 98vw);
      margin: 20px auto;
      padding: 0 16px 60px;
    }

    .ot-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .ot-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ot-title h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      color: #0f172a;
    }

    .ot-title i {
      font-size: 1.6rem;
      color: #dc2626;
    }

    .ot-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #fff;
      color: #374151;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }

    .ot-back:hover {
      background: #f3f4f6;
      border-color: #d1d5db;
    }

    /* Section Card */
    .ot-section {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(16, 24, 40, 0.06);
      overflow: hidden;
      margin-bottom: 24px;
      border: 1px solid #f1f5f9;
    }

    .ot-section-head {
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ot-section-head h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ot-section-head--current {
      background: linear-gradient(135deg, #dc2626, #f97316);
      color: #fff;
    }

    .ot-section-head--upcoming {
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      color: #fff;
    }

    .ot-section-head--past {
      background: linear-gradient(135deg, #64748b, #475569);
      color: #fff;
    }

    .ot-section-badge {
      margin-left: auto;
      padding: 4px 14px;
      background: rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .ot-section-body {
      padding: 16px 20px;
    }

    .ot-section-body.ot-empty {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
      font-style: italic;
    }

    /* Day Group inside section */
    .ot-day {
      margin-bottom: 14px;
      border: 1px solid #f1f5f9;
      border-radius: 14px;
      overflow: hidden;
    }

    .ot-day:last-child {
      margin-bottom: 0;
    }

    .ot-day-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #f8fafc;
      border-bottom: 1px solid #f1f5f9;
    }

    .ot-day-head--today {
      background: linear-gradient(135deg, #fef2f2, #fff7ed);
    }

    .ot-day-dow {
      font-weight: 800;
      font-size: 0.82rem;
      padding: 3px 10px;
      border-radius: 6px;
      background: #fee2e2;
      color: #dc2626;
    }

    .ot-day-head--upcoming .ot-day-dow {
      background: #ede9fe;
      color: #7c3aed;
    }

    .ot-day-head--past .ot-day-dow {
      background: #f1f5f9;
      color: #64748b;
    }

    .ot-day-date {
      font-weight: 600;
      font-size: 0.88rem;
      color: #374151;
    }

    .ot-day-today-tag {
      font-size: 0.7rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #dc2626, #f97316);
      padding: 2px 10px;
      border-radius: 999px;
    }

    .ot-day-count {
      margin-left: auto;
      font-size: 0.75rem;
      font-weight: 600;
      color: #6b7280;
    }

    /* Teacher Item */
    .ot-teacher {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid #f9fafb;
      transition: background 0.12s;
    }

    .ot-teacher:last-child {
      border-bottom: none;
    }

    .ot-teacher:hover {
      background: #fafbfc;
    }

    .ot-teacher-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #dc2626, #f97316);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .ot-section-head--upcoming ~ .ot-section-body .ot-teacher-avatar {
      background: linear-gradient(135deg, #7c3aed, #6366f1);
    }

    .ot-section-head--past ~ .ot-section-body .ot-teacher-avatar {
      background: linear-gradient(135deg, #64748b, #475569);
    }

    .ot-teacher-info {
      flex: 1;
      min-width: 0;
    }

    .ot-teacher-name {
      font-weight: 600;
      font-size: 0.92rem;
      color: #111827;
    }

    .ot-teacher-shifts {
      font-size: 0.78rem;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }

    .ot-teacher-dept {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      background: #f5f3ff;
      color: #7c3aed;
      border: 1px solid #ede9fe;
    }

    /* Loading */
    .ot-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px 20px;
      color: #6b7280;
    }

    .ot-loading i {
      font-size: 24px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toggle section body */
    .ot-section-head {
      cursor: pointer;
      user-select: none;
    }

    .ot-section-chevron {
      margin-left: 8px;
      transition: transform 0.2s;
    }

    .ot-section.collapsed .ot-section-body {
      display: none;
    }

    .ot-section.collapsed .ot-section-chevron {
      transform: rotate(-90deg);
    }


/* Three-column layout */
    .ot-columns {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .ot-col-left {
      flex: 1;
      min-width: 0;
    }

    .ot-col-right {
      flex: 1;
      min-width: 0;
    }

    .ot-col-third {
      flex: 1;
      min-width: 0;
    }

    @media (max-width: 1200px) {
      .ot-columns {
        flex-wrap: wrap;
      }
      .ot-col-left,
      .ot-col-right,
      .ot-col-third {
        flex: 1 1 45%;
      }
    }

    @media (max-width: 900px) {
      .ot-columns {
        flex-direction: column;
      }
    }

    /* Unmatched students section */
    .um-section {
      background: #fff;

      display: flex;

    .um-student:hover {

    .um-student-avatar {

    /* Substitute teacher indicator */
    .um-student--has-sub {
      background: #f0fdf4;
      border-left: 3px solid #22c55e;
    }
    .um-student--has-sub:hover {
      background: #dcfce7;
    }
    .um-student--no-sub {
      border-left: 3px solid #ef4444;
    }
    .um-sub-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 3px;
      font-size: 0.72rem;
      font-weight: 600;
      color: #15803d;
    }
    .um-sub-badge i {
      color: #22c55e;
      font-size: 0.7rem;
    }
    .um-no-sub-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 3px;
      font-size: 0.72rem;
      font-weight: 600;
      color: #dc2626;
    }
    .um-no-sub-badge i {
      color: #ef4444;
      font-size: 0.7rem;
    }

    /* Compact role pills for multi-role students */
    .um-role-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .um-role-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      border: 1px solid;
      cursor: pointer;
      transition: filter 0.12s;
      user-select: none;
    }
    .um-role-pill:hover {
      filter: brightness(0.95);
    }
    .um-role-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .um-role-sub-name {
      font-size: 0.65rem;
      font-weight: 500;
      opacity: 0.85;
    }
    .um-student--partial-sub {
      border-left: 3px solid #f59e0b;
    }
    .um-student--partial-sub:hover {
      background: #fffbeb;
    }

/* Merged multi-role card */
    .um-student--multi {
      align-items: flex-start;
    }
    .um-student--multi .um-student-avatar {
      margin-top: 4px;
    }
    .um-student--multi .um-student-time {
      margin-top: 4px;
    }
    .um-role-rows {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 6px;
    }
    .um-role-row {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #f1f5f9;
      background: #fafbfc;
      transition: background 0.12s, border-color 0.12s;
    }
    .um-role-row:hover {
      background: #f0f4ff;
      border-color: #c7d2fe;
    }
    .um-role-row-top {
      display: flex;
      align-items: center;
      gap: 8px;

    }
    /* Partial sub = orange left border */
    .um-student--partial-sub {
      border-left: 3px solid #f59e0b;
    }
    .um-student--partial-sub:hover {
      background: #fffbeb;
    }

    .um-section-chevron {
      margin-left: 8px;

    }

    .um-section.collapsed .um-section-body {
      display: none;
    }

    .um-section.collapsed .um-section-chevron {
      transform: rotate(-90deg);
    }

/* Upcoming impacted students section (blue theme, same layout as um-) */
    .ui-section {
      background: #fff;

    /* Responsive */
    /* Impacted Students */
    .ot-impacted {
      padding: 4px 16px 10px 66px;

    }

<body>
  <!-- Login Card -->
  <div class="card" id="loginCard">
    <div class="logo">Meetings</div>
    <div class="subtitle">Đăng nhập bằng email &amp; mật khẩu của bạn</div>

    <div class="field">
      <input id="email" type="email" autocomplete="username" placeholder="Email" required />
    </div>

    <div class="field">
      <input id="password" type="password" autocomplete="current-password" placeholder="Mật khẩu" required />
      <button class="toggle-password" id="togglePwd" aria-label="Hiện/ẩn mật khẩu">👁️</button>
    </div>

    <button class="btn" id="login">Đăng nhập</button>
    <div id="message" aria-live="polite"></div>
  </div>
